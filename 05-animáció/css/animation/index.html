<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>CSS Animációk bemutató</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section>
        <h2>1. Alap mozgás</h2>
        <div class="move-box"></div>
    </section>

    <section>
        <h2>2. Több lépéses animáció</h2>
        <div class="multi-box"></div>
    </section>

    <section>
        <h2>3. Pattogó labda</h2>
        <div class="ball"></div>
    </section>

    <section>
        <h2>4. Loader (forgás)</h2>
        <div class="loader"></div>
    </section>

    <section>
        <h2>5. Hover animáció</h2>
        <div class="hover-box"></div>
        <p>Vidd rá az egeret!</p>
    </section>

    <section class="sec-bg">
        <h2>6. Végtelen háttér animáció</h2>
        <div class="bg"></div>
        <div class="fg"></div>
    </section>

    <section class="sec-bg">
        <h2>6. Végtelen háttér animáció</h2>
        <div class="bg">
            <div id="mario"></div>
        </div>
        <div class="fg"></div>
    </section>

</body>

</html>
